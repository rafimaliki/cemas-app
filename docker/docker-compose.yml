version: "3.8"

services:
  frontend:
    container_name: frontend
    ports:
      - "3000:3000"
    build:
      context: ../frontend
      dockerfile: Dockerfile.dev
    env_file:
      - ../frontend/.env.local
    volumes:
      - ../frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  backend:
    container_name: backend
    ports:
      - "5000:5000"
    build:
      context: ../backend
      dockerfile: Dockerfile.dev
    env_file:
      - ../backend/.env.local
    volumes:
      - ../backend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    restart: unless-stopped
    depends_on:
      - postgres

  drizzle-studio:
    container_name: drizzle-studio
    build:
      context: ../backend
      dockerfile: Dockerfile.dev
    command: sh -c "npm install pg postgres && npx drizzle-kit studio --port 4000 --host 0.0.0.0"
    ports:
      - "4000:4000"
    env_file:
      - ../backend/.env.local
    volumes:
      - ../backend:/app
      - /app/node_modules
    depends_on:
      - backend
      - postgres
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/if04_db

  postgres:
    container_name: postgres
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=if04_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
